version: '3.8'

services:
  mapper:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - mapper-data:/app/data
      - mapper-output:/app/output
      - mapper-images:/app/images
      - /var/run/docker.sock:/var/run/docker.sock  # For ODM Docker-in-Docker
    environment:
      - DATABASE_URL=sqlite:///mapper.db
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - mapper
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mapper-data:
  mapper-output:
  mapper-images:
